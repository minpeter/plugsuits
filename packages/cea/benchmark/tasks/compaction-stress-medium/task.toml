schema_version = "1.1"

[task]
name = "compaction-stress-medium"
description = "Stress medium-context Node.js workflow recall under constrained memory"
authors = [{ name = "minpeter", email = "minpeter@plugsuits.dev" }]
keywords = ["compaction", "medium", "nodejs", "context-pressure"]

[metadata]
difficulty = "medium"
category = "compaction-benchmark"
context_limit_override = 6000

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
build_timeout_sec = 300.0
cpus = 1
memory_mb = 2048
storage_mb = 4096
env = { CONTEXT_LIMIT_OVERRIDE = "${CONTEXT_LIMIT_OVERRIDE}" }
