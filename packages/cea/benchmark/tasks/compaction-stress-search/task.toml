schema_version = "1.1"

[task]
name = "compaction-stress-search"
description = "Audit a 15-file microservice codebase for bugs and security issues under 32K token context pressure"
authors = [{ name = "minpeter", email = "minpeter@plugsuits.dev" }]
keywords = ["compaction", "search", "memory", "context-pressure"]

[metadata]
difficulty = "hard"
category = "compaction-benchmark"
context_limit_override = 32000

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 600.0

[environment]
build_timeout_sec = 300.0
cpus = 1
memory_mb = 2048
storage_mb = 4096
env = { CONTEXT_LIMIT_OVERRIDE = "${CONTEXT_LIMIT_OVERRIDE}" }
